<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор возврата долга</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 { 
            color: #333; 
            margin-bottom: 1.5rem; 
            font-size: 1.5rem;
            text-align: center;
        }
        .input-group { 
            margin-bottom: 1rem; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #666; 
            font-size: 0.9rem; 
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { 
            background-color: #218838; 
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
            display: none;
        }
        .result p { 
            margin: 8px 0; 
            font-size: 1rem; 
        }
        .period-info {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ccc;
        }
        .final-sum { 
            font-weight: bold; 
            color: #d9534f; 
            font-size: 1.4rem; 
        }
        .interest-amount {
            color: #f0ad4e;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .date-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>💰 Калькулятор возврата</h1>
    
    <div class="input-group">
        <label for="amount">Сумма долга (руб):</label>
        <input type="number" id="amount" placeholder="Например: 10000">
    </div>

    <div class="date-row">
        <div class="input-group">
            <label for="startDate">Дата получения:</label>
            <input type="date" id="startDate">
        </div>
        
        <div class="input-group">
            <label for="endDate">Дата возврата:</label>
            <input type="date" id="endDate">
        </div>
    </div>

    <div class="input-group">
        <label for="percent">Годовая процентная ставка (%):</label>
        <input type="number" id="percent" placeholder="Например: 14.5" step="0.1">
    </div>

    <button onclick="calculate()">Рассчитать</button>

    <div id="resultBox" class="result">
        <div class="period-info" id="periodInfo"></div>
        <p>💵 Взял: <span id="displayAmount">0</span> ₽</p>
        <p>📊 Годовая ставка: <span id="displayPercent">0</span>%</p>
        <p>📈 Проценты за период: <span class="interest-amount" id="interestAmount">0</span> ₽</p>
        <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">
        <p>💳 Вернуть нужно: <br><span class="final-sum" id="finalSum">0</span> ₽</p>
    </div>
</div>

<script>
    // Устанавливаем сегодняшнюю дату по умолчанию
    window.onload = function() {
        const today = new Date();
        const formattedToday = today.toISOString().split('T')[0];
        document.getElementById('endDate').value = formattedToday;
        
        // Предлагаем дату месяц назад как дату получения (можно изменить)
        const lastMonth = new Date();
        lastMonth.setMonth(lastMonth.getMonth() - 1);
        document.getElementById('startDate').value = lastMonth.toISOString().split('T')[0];
    };

    function calculate() {
        const amount = parseFloat(document.getElementById('amount').value);
        const percent = parseFloat(document.getElementById('percent').value);
        const startDate = new Date(document.getElementById('startDate').value);
        const endDate = new Date(document.getElementById('endDate').value);
        const resultBox = document.getElementById('resultBox');

        // Проверка ввода
        if (isNaN(amount) || isNaN(percent)) {
            alert("Пожалуйста, введите сумму и процентную ставку");
            return;
        }
        
        if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) {
            alert("Пожалуйста, выберите даты");
            return;
        }
        
        if (endDate < startDate) {
            alert("Дата возврата не может быть раньше даты получения");
            return;
        }

        // Рассчитываем количество дней
        const timeDiff = endDate.getTime() - startDate.getTime();
        const days = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1; // +1 чтобы включить оба дня
        
        // Рассчитываем проценты за фактический период
        // Формула: Сумма × (Годовая ставка / 100) × (Количество дней / 365)
        const interest = amount * (percent / 100) * (days / 365);
        const total = amount + interest;

        // Форматируем даты для отображения
        const startStr = startDate.toLocaleDateString('ru-RU');
        const endStr = endDate.toLocaleDateString('ru-RU');

        // Показываем результаты
        document.getElementById('periodInfo').innerHTML = 
            `📅 Период: ${startStr} — ${endStr}<br>⏱️ Количество дней: ${days}`;
        document.getElementById('displayAmount').innerText = amount.toLocaleString('ru-RU');
        document.getElementById('displayPercent').innerText = percent;
        document.getElementById('interestAmount').innerText = interest.toLocaleString('ru-RU', {
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2
        });
        document.getElementById('finalSum').innerText = total.toLocaleString('ru-RU', {
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2
        });

        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
